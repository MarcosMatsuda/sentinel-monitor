# Local infra for the Sentinel Monitor signaling server.
# Camera and viewer apps are static deploys; you run them with their own dev
# scripts (Vite / Expo) and point them at the server URL exposed below.

services:
  server:
    container_name: sentinel-server
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: sentinel-monitor/server:local
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3010}:3010"
    environment:
      NODE_ENV: production
      PORT: 3010
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TURN_URL: ${TURN_URL:-}
      TURN_USER: ${TURN_USER:-}
      TURN_PASS: ${TURN_PASS:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # LAN gateway stack — opt in via `--profile gateway`.
  #   docker compose --profile gateway up
  #
  # go2rtc bridges RTSP from your IP cams (Tapo C200, Reolink, etc.) to WebRTC.
  # The gateway service registers each camera with go2rtc, connects to the
  # signaling server using a stable per-camera UUID, and proxies WHEP offers
  # back to viewers anywhere on the internet.
  # ---------------------------------------------------------------------------
  go2rtc:
    container_name: sentinel-go2rtc
    image: alexxit/go2rtc:latest
    profiles: ["gateway"]
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./gateway/go2rtc.yaml:/config/go2rtc.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:1984/api/streams"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gateway:
    container_name: sentinel-gateway
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    image: sentinel-monitor/gateway:local
    profiles: ["gateway"]
    restart: unless-stopped
    network_mode: host
    depends_on:
      - go2rtc
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${GATEWAY_LOG_LEVEL:-info}
      GATEWAY_CONFIG_PATH: /app/config/gateway.yaml
      GATEWAY_HTTP_PORT: 9090
    volumes:
      - ./gateway/gateway.yaml:/app/config/gateway.yaml
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
